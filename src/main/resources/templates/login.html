<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Kitchen</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css">
</head>
<body th:classappend="${'theme-' + theme}" class="page-login">
<div class="card">
    <h1>Welcome to Kitchen</h1>
    <form th:action="@{/login}" th:object="${loginForm}" method="post">
        <label for="email">Email address</label>
        <input type="email" id="email" th:field="*{email}" name="email" placeholder="you@example.com" required
               autocomplete="email">
        <button type="submit">Enter</button>
    </form>
</div>
</body>
</html>
